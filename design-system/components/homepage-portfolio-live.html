<style>
/* === SURIOTA Live Portfolio Table — refined, no decorative ornaments === */
.sx-portfolio-live {
  --pl-bg: #FFFFFF;
  --pl-bg-alt: #FAFBFC;
  --pl-bg-hover: #F3F6F8;
  --pl-line: #EAEFF1;
  --pl-line-strong: #D7DEE2;
  --pl-ink: #0E2530;
  --pl-ink-soft: #4D5E66;
  --pl-ink-mute: #8B9CA3;
  --pl-accent: #205B69;
  --pl-accent-deep: #0E3942;
  --pl-amber: #C8851F;
  --pl-green: #3C7D47;
  --pl-radius-md: 10px;
  --pl-radius-sm: 6px;
  --pl-radius-pill: 999px;
  --pl-ease: cubic-bezier(0.22, 1, 0.36, 1);
  font-family: 'Geist', system-ui, -apple-system, sans-serif;
  color: var(--pl-ink);
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 16px;
}
.sx-portfolio-live * { box-sizing: border-box; }

/* --- Header row: count + filter --- */
.sx-pl-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.sx-pl-count {
  display: inline-flex;
  align-items: baseline;
  gap: 8px;
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--pl-ink-mute);
}
.sx-pl-count strong {
  color: var(--pl-ink);
  font-weight: 600;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
}
.sx-pl-filter {
  position: relative;
  flex: 0 1 320px;
  min-width: 200px;
}
.sx-pl-filter input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  color: var(--pl-ink);
  background: var(--pl-bg);
  border: 1px solid var(--pl-line);
  border-radius: var(--pl-radius-sm);
  outline: none;
  transition: border-color 160ms var(--pl-ease), box-shadow 160ms var(--pl-ease);
}
.sx-pl-filter input::placeholder { color: var(--pl-ink-mute); }
.sx-pl-filter input:hover { border-color: var(--pl-line-strong); }
.sx-pl-filter input:focus {
  border-color: var(--pl-accent);
  box-shadow: 0 0 0 3px rgba(32,91,105,0.10);
}
.sx-pl-filter::before {
  content: "";
  position: absolute;
  left: 13px; top: 50%;
  width: 14px; height: 14px;
  transform: translateY(-50%);
  background: no-repeat center / contain;
  background-image: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238B9CA3' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='11' cy='11' r='7'/%3E%3Cpath d='M21 21l-4.35-4.35'/%3E%3C/svg%3E");
}

/* --- Year filter pills --- */
.sx-pl-years {
  display: inline-flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.sx-pl-year-pill {
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.06em;
  padding: 5px 11px;
  border: 1px solid var(--pl-line);
  border-radius: var(--pl-radius-pill);
  background: var(--pl-bg);
  color: var(--pl-ink-soft);
  cursor: pointer;
  transition: all 160ms var(--pl-ease);
  font-variant-numeric: tabular-nums;
}
.sx-pl-year-pill:hover { border-color: var(--pl-accent); color: var(--pl-ink); }
.sx-pl-year-pill[aria-pressed="true"] {
  background: var(--pl-accent-deep);
  color: #fff;
  border-color: var(--pl-accent-deep);
}

/* --- Table wrap --- */
.sx-pl-table-wrap {
  border: 1px solid var(--pl-line);
  border-radius: var(--pl-radius-md);
  background: var(--pl-bg);
  overflow: hidden;
}

/* --- Table --- */
.sx-pl-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

/* Head */
.sx-pl-table thead th {
  text-align: left;
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--pl-ink-mute);
  padding: 13px 18px;
  background: var(--pl-bg-alt);
  border-bottom: 1px solid var(--pl-line-strong);
  user-select: none;
  cursor: pointer;
  position: relative;
  white-space: nowrap;
  transition: color 120ms var(--pl-ease), background 120ms var(--pl-ease);
}
.sx-pl-table thead th:first-child { padding-left: 22px; }
.sx-pl-table thead th:last-child  { padding-right: 22px; }
.sx-pl-table thead th:hover { color: var(--pl-ink); background: #EEF2F4; }
.sx-pl-table thead th[data-sort-active] { color: var(--pl-accent-deep); }
.sx-pl-table thead th[data-sort-active]::after {
  content: "";
  display: inline-block;
  width: 9px; height: 9px;
  margin-left: 6px;
  vertical-align: -1px;
  background: no-repeat center / contain;
}
.sx-pl-table thead th[data-sort-active="asc"]::after {
  background-image: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%230E3942'%3E%3Cpath d='M8 4L13 11H3z'/%3E%3C/svg%3E");
}
.sx-pl-table thead th[data-sort-active="desc"]::after {
  background-image: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%230E3942'%3E%3Cpath d='M8 12L3 5h10z'/%3E%3C/svg%3E");
}

/* Body */
.sx-pl-table tbody tr {
  border-bottom: 1px solid var(--pl-line);
  transition: background 140ms var(--pl-ease);
  opacity: 0;
  transform: translateY(4px);
  animation: sx-pl-reveal 320ms var(--pl-ease) forwards;
}
.sx-pl-table tbody tr:nth-child(even) { background: var(--pl-bg-alt); }
.sx-pl-table tbody tr:last-child { border-bottom: 0; }
.sx-pl-table tbody tr:hover { background: var(--pl-bg-hover); }
@keyframes sx-pl-reveal { to { opacity: 1; transform: translateY(0); } }

.sx-pl-table td {
  padding: 13px 18px;
  vertical-align: middle;
  color: var(--pl-ink);
  line-height: 1.45;
}
.sx-pl-table td:first-child { padding-left: 22px; }
.sx-pl-table td:last-child  { padding-right: 22px; }

/* Column No — mono, muted, fixed width */
.sx-pl-table td:first-child {
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--pl-ink-mute);
  width: 56px;
  font-variant-numeric: tabular-nums;
}

/* Column Client — bolder, with subtle left accent on hover row */
.sx-pl-table td:nth-child(2) {
  font-weight: 600;
  letter-spacing: -0.005em;
  white-space: nowrap;
  max-width: 260px;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Column Project — softer, secondary */
.sx-pl-table td:nth-child(3) {
  color: var(--pl-ink-soft);
  font-size: 13.5px;
  line-height: 1.5;
}

/* Column Year — fixed width, right aligned */
.sx-pl-table td:nth-child(4) { width: 90px; text-align: right; }

/* Year badge — refined: tinted bg + colored dot */
.sx-pl-yb {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px 3px 8px;
  border-radius: var(--pl-radius-pill);
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.04em;
  border: 1px solid;
  font-variant-numeric: tabular-nums;
}
.sx-pl-yb::before {
  content: "";
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
}
.sx-pl-yb.y-2025 { color: var(--pl-amber);      border-color: rgba(200,133,31,0.30); background: rgba(200,133,31,0.07); }
.sx-pl-yb.y-2024 { color: var(--pl-accent);     border-color: rgba(32,91,105,0.28);  background: rgba(32,91,105,0.06);  }
.sx-pl-yb.y-2023 { color: var(--pl-accent-deep);border-color: rgba(14,57,66,0.30);   background: rgba(14,57,66,0.05);   }

/* --- States --- */
.sx-pl-loading, .sx-pl-empty, .sx-pl-error {
  padding: 40px 24px;
  text-align: center;
  color: var(--pl-ink-mute);
  font-size: 13px;
}
.sx-pl-loading::before {
  content: "";
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid var(--pl-line);
  border-top-color: var(--pl-accent);
  border-radius: 50%;
  animation: sx-pl-spin 800ms linear infinite;
  vertical-align: -2px;
  margin-right: 10px;
}
@keyframes sx-pl-spin { to { transform: rotate(360deg); } }

/* --- Mobile: convert table to card list --- */
@media (max-width: 720px) {
  .sx-pl-head { flex-direction: column; align-items: stretch; gap: 10px; }
  .sx-pl-filter { flex: 1 1 auto; min-width: 0; }
  .sx-pl-table-wrap { border: 0; background: transparent; border-radius: 0; overflow: visible; }
  .sx-pl-table, .sx-pl-table tbody { display: block; width: 100%; }
  .sx-pl-table thead { display: none; }
  .sx-pl-table tr {
    display: grid;
    grid-template-columns: auto 1fr auto;
    grid-template-areas:
      "num client year"
      "proj proj  proj";
    gap: 6px 12px;
    align-items: center;
    padding: 14px 16px;
    margin-bottom: 8px;
    background: var(--pl-bg);
    border: 1px solid var(--pl-line);
    border-radius: var(--pl-radius-md);
    animation: sx-pl-reveal 320ms var(--pl-ease) forwards;
  }
  .sx-pl-table tr:nth-child(even) { background: var(--pl-bg-alt); }
  .sx-pl-table tr:hover { background: var(--pl-bg-hover); border-color: var(--pl-line-strong); }
  .sx-pl-table td {
    display: block;
    padding: 0;
    border: 0;
    width: auto;
    max-width: none;
    text-align: left;
    white-space: normal;
    line-height: 1.45;
    overflow: visible;
    text-overflow: clip;
  }
  .sx-pl-table td:first-child {
    grid-area: num;
    width: auto;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--pl-amber);
    letter-spacing: 0.05em;
  }
  .sx-pl-table td:nth-child(2) {
    grid-area: client;
    font-weight: 600;
    font-size: 14px;
    color: var(--pl-ink);
  }
  .sx-pl-table td:nth-child(3) {
    grid-area: proj;
    color: var(--pl-ink-soft);
    font-size: 13px;
    padding-top: 2px;
    border-top: 1px dashed var(--pl-line);
    margin-top: 4px;
    padding-top: 8px;
  }
  .sx-pl-table td:nth-child(4) {
    grid-area: year;
    width: auto;
    text-align: right;
  }
}

@media (prefers-reduced-motion: reduce) {
  .sx-pl-table tbody tr { animation: none; opacity: 1; transform: none; }
  .sx-pl-loading::before { animation: none; }
}
</style>

<div class="sx-portfolio-live" data-component="sx-portfolio-live">
  <div class="sx-pl-head">
    <span class="sx-pl-count"><strong data-pl-count-num>—</strong><span data-pl-i18n="of-latest">of latest 10</span></span>
    <div class="sx-pl-filter">
      <input type="search" placeholder="Filter by client or project…" aria-label="Filter portfolio" data-pl-filter>
    </div>
  </div>
  <div class="sx-pl-years" data-pl-years></div>
  <div class="sx-pl-table-wrap">
    <div class="sx-pl-loading" data-pl-loading>Loading latest projects…</div>
    <table class="sx-pl-table" data-pl-table hidden>
      <thead>
        <tr>
          <th data-sort-key="num" data-sort-type="num"><span data-pl-i18n="col-no">No</span></th>
          <th data-sort-key="client" data-sort-type="str"><span data-pl-i18n="col-client">Client</span></th>
          <th data-sort-key="project" data-sort-type="str"><span data-pl-i18n="col-project">Project</span></th>
          <th data-sort-key="year" data-sort-type="num" data-sort-active="desc"><span data-pl-i18n="col-year">Year</span></th>
        </tr>
      </thead>
      <tbody data-pl-tbody></tbody>
    </table>
    <div class="sx-pl-empty" data-pl-empty hidden data-pl-i18n="empty">No matching projects.</div>
    <div class="sx-pl-error" data-pl-error hidden></div>
  </div>
</div>

<script>
(function () {
  if (window.__sxPortfolioLive) return;
  window.__sxPortfolioLive = true;

  var SOURCES = {
    en: 'https://suriota.com/portfolio/',
    id: 'https://suriota.com/id/portfolio-id/',
    zh: 'https://suriota.com/zh/anli/'
  };
  var I18N = {
    en: { 'of-latest': 'of latest 10', 'col-no': 'No', 'col-client': 'Client', 'col-project': 'Project', 'col-year': 'Year', empty: 'No matching projects.', loading: 'Loading latest projects…', error: 'Could not load latest projects. Visit /portfolio/ for the full list.', filter: 'Filter by client or project…' },
    id: { 'of-latest': 'dari 10 proyek terbaru', 'col-no': 'No', 'col-client': 'Klien', 'col-project': 'Proyek', 'col-year': 'Tahun', empty: 'Tidak ada proyek yang cocok.', loading: 'Memuat proyek terbaru…', error: 'Gagal memuat. Buka /id/portfolio-id/ untuk daftar lengkap.', filter: 'Cari klien atau proyek…' },
    zh: { 'of-latest': '/ 最近 10 个项目', 'col-no': '编号', 'col-client': '客户', 'col-project': '项目', 'col-year': '年份', empty: '无匹配项目。', loading: '加载最新项目…', error: '无法加载。请访问 /zh/anli/ 查看完整列表。', filter: '搜索客户或项目…' }
  };
  var CACHE_TTL_MS = 5 * 60 * 1000;

  function detectLang() {
    var html = document.documentElement.lang || '';
    var l = html.toLowerCase().slice(0, 2);
    return SOURCES[l] ? l : 'en';
  }

  function ready(fn) {
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', fn);
    else fn();
  }

  ready(function () {
    var root = document.querySelector('.sx-portfolio-live[data-component="sx-portfolio-live"]');
    if (!root) return;
    var lang = detectLang();
    var t = I18N[lang];
    root.querySelectorAll('[data-pl-i18n]').forEach(function (el) {
      var k = el.getAttribute('data-pl-i18n');
      if (t[k]) el.textContent = t[k];
    });
    var input = root.querySelector('[data-pl-filter]');
    if (input) input.placeholder = t.filter;
    var loadingEl = root.querySelector('[data-pl-loading]');
    if (loadingEl) loadingEl.textContent = t.loading;

    var srcUrl = SOURCES[lang];
    var CACHE_KEY = 'sxPortfolioCache_' + lang;

    var cached = null;
    try {
      var raw = sessionStorage.getItem(CACHE_KEY);
      if (raw) {
        var p = JSON.parse(raw);
        if (p && (Date.now() - p.ts) < CACHE_TTL_MS) cached = p.rows;
      }
    } catch (e) {}

    if (cached) render(cached);
    fetchSource();

    function fetchSource() {
      fetch(srcUrl, { credentials: 'omit' })
        .then(function (r) { return r.text(); })
        .then(function (html) {
          var rows = parseRows(html);
          if (!rows.length) throw new Error('no rows');
          try {
            sessionStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), rows: rows }));
          } catch (e) {}
          render(rows);
        })
        .catch(function () {
          if (cached) return;
          var errEl = root.querySelector('[data-pl-error]');
          loadingEl.hidden = true;
          errEl.hidden = false;
          errEl.textContent = t.error;
        });
    }

    function parseRows(html) {
      var doc = new DOMParser().parseFromString(html, 'text/html');
      var trs = doc.querySelectorAll('table.port-table tbody tr');
      var out = [];
      trs.forEach(function (tr) {
        var tds = tr.querySelectorAll('td');
        if (tds.length < 4) return;
        var yearText = tds[3].textContent.trim();
        out.push({
          num: parseInt(tds[0].textContent.trim(), 10) || 0,
          client: tds[1].textContent.trim(),
          project: tds[2].textContent.trim(),
          year: parseInt(yearText, 10) || 0,
          yearText: yearText
        });
      });
      return out;
    }

    var state = { rows: [], top10: [], filtered: [], sort: { key: 'year', type: 'num', dir: 'desc' }, yearFilter: null, textFilter: '' };

    function render(rows) {
      loadingEl.hidden = true;
      var top10 = rows.slice().sort(function (a, b) { return a.num - b.num; }).slice(0, 10);
      state.rows = rows;
      state.top10 = top10;
      var years = Array.from(new Set(top10.map(function (r) { return r.yearText; }))).sort().reverse();
      var pillsWrap = root.querySelector('[data-pl-years]');
      pillsWrap.innerHTML = '';
      years.forEach(function (y) {
        var pill = document.createElement('button');
        pill.type = 'button';
        pill.className = 'sx-pl-year-pill';
        pill.textContent = y;
        pill.setAttribute('data-year', y);
        pill.setAttribute('aria-pressed', 'false');
        pill.addEventListener('click', function () {
          state.yearFilter = state.yearFilter === y ? null : y;
          pillsWrap.querySelectorAll('button').forEach(function (b) {
            b.setAttribute('aria-pressed', b.getAttribute('data-year') === state.yearFilter ? 'true' : 'false');
          });
          applyFiltersAndSort();
        });
        pillsWrap.appendChild(pill);
      });
      root.querySelectorAll('th[data-sort-key]').forEach(function (th) {
        th.addEventListener('click', function () {
          var k = th.getAttribute('data-sort-key');
          var ty = th.getAttribute('data-sort-type');
          if (state.sort.key === k) state.sort.dir = state.sort.dir === 'asc' ? 'desc' : 'asc';
          else { state.sort.key = k; state.sort.type = ty; state.sort.dir = 'asc'; }
          root.querySelectorAll('th[data-sort-key]').forEach(function (h) { h.removeAttribute('data-sort-active'); });
          th.setAttribute('data-sort-active', state.sort.dir);
          applyFiltersAndSort();
        });
      });
      input.addEventListener('input', function () {
        state.textFilter = input.value.toLowerCase().trim();
        applyFiltersAndSort();
      });
      applyFiltersAndSort();
    }

    function applyFiltersAndSort() {
      var rows = state.top10.slice();
      if (state.yearFilter) rows = rows.filter(function (r) { return r.yearText === state.yearFilter; });
      if (state.textFilter) {
        rows = rows.filter(function (r) {
          return (r.client + ' ' + r.project).toLowerCase().indexOf(state.textFilter) !== -1;
        });
      }
      rows.sort(function (a, b) {
        var k = state.sort.key, ty = state.sort.type, dir = state.sort.dir;
        var va = a[k], vb = b[k];
        var cmp = ty === 'num' ? (va - vb) : String(va).localeCompare(String(vb));
        return dir === 'asc' ? cmp : -cmp;
      });
      state.filtered = rows;
      paint(rows);
    }

    function paint(rows) {
      var tbody = root.querySelector('[data-pl-tbody]');
      var table = root.querySelector('[data-pl-table]');
      var empty = root.querySelector('[data-pl-empty]');
      tbody.innerHTML = '';
      if (rows.length === 0) {
        table.hidden = true;
        empty.hidden = false;
        root.querySelector('[data-pl-count-num]').textContent = '0';
        return;
      }
      empty.hidden = true;
      table.hidden = false;
      rows.forEach(function (r, idx) {
        var tr = document.createElement('tr');
        tr.style.animationDelay = (idx * 35) + 'ms';
        tr.innerHTML =
          '<td>' + String(r.num).padStart(2, '0') + '</td>' +
          '<td>' + escapeHtml(r.client) + '</td>' +
          '<td>' + escapeHtml(r.project) + '</td>' +
          '<td><span class="sx-pl-yb y-' + r.yearText + '">' + r.yearText + '</span></td>';
        tbody.appendChild(tr);
      });
      root.querySelector('[data-pl-count-num]').textContent = String(rows.length);
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
  });
})();
</script>
