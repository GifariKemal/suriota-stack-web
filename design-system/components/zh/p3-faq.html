<section class="sxp-section">
  <div class="sxp-wrap">
    <p class="sxp-eyebrow">常见问题</p>
    <h2 class="sxp-h2 sxp-reveal">常见问题。</h2>
    <div class="sxp-faq sxp-reveal">
      <div class="sxp-faq__item">
        <button class="sxp-faq__btn" aria-expanded="false" aria-controls="p3-faq-1">
          <span>典型的成熟度评估需要多久？</span><span class="sxp-faq__icon" aria-hidden="true"></span>
        </button>
        <div class="sxp-faq__panel" id="p3-faq-1" role="region">
          <p class="sxp-body">从启动到交付物完成通常需 4–6 周，具体取决于工厂复杂度。</p>
        </div>
      </div>
      <div class="sxp-faq__item">
        <button class="sxp-faq__btn" aria-expanded="false" aria-controls="p3-faq-2">
          <span>你们是否与特定技术供应商绑定？</span><span class="sxp-faq__icon" aria-hidden="true"></span>
        </button>
        <div class="sxp-faq__panel" id="p3-faq-2" role="region">
          <p class="sxp-body">不。我们保持供应商中立。所有建议基于客户实际匹配度，绝无返利驱动。</p>
        </div>
      </div>
      <div class="sxp-faq__item">
        <button class="sxp-faq__btn" aria-expanded="false" aria-controls="p3-faq-3">
          <span>你们会负责落地自己推荐的方案吗？</span><span class="sxp-faq__icon" aria-hidden="true"></span>
        </button>
        <div class="sxp-faq__panel" id="p3-faq-3" role="region">
          <p class="sxp-body">可以 —— 我们的第 1、2、4、5 项服务是落地能力。但您也可以将路线图交由任何团队执行。</p>
        </div>
      </div>
      <div class="sxp-faq__item">
        <button class="sxp-faq__btn" aria-expanded="false" aria-controls="p3-faq-4">
          <span>是否必须签署多年合同？</span><span class="sxp-faq__icon" aria-hidden="true"></span>
        </button>
        <div class="sxp-faq__panel" id="p3-faq-4" role="region">
          <p class="sxp-body">无需。我们按阶段签订合同。评估完成后您可以暂停合作。</p>
        </div>
      </div>
    </div>
  </div>
</section>
