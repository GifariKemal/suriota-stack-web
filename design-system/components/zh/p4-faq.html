<section class="sxp-section">
  <div class="sxp-wrap">
    <p class="sxp-eyebrow">常见问题</p>
    <h2 class="sxp-h2 sxp-reveal">常见问题。</h2>
    <div class="sxp-faq sxp-reveal">
      <div class="sxp-faq__item">
        <button class="sxp-faq__btn" aria-expanded="false" aria-controls="p4-faq-1">
          <span>你们是否同时承接 PLN 审批与现场安装？</span><span class="sxp-faq__icon" aria-hidden="true"></span>
        </button>
        <div class="sxp-faq__panel" id="p4-faq-1" role="region">
          <p class="sxp-body">是的。我们提供单一对接的服务，包括 SLO、调试文件与电网接入。</p>
        </div>
      </div>
      <div class="sxp-faq__item">
        <button class="sxp-faq__btn" aria-expanded="false" aria-controls="p4-faq-2">
          <span>你们支持哪些 SCADA 平台？</span><span class="sxp-faq__icon" aria-hidden="true"></span>
        </button>
        <div class="sxp-faq__panel" id="p4-faq-2" role="region">
          <p class="sxp-body">Ignition (Inductive Automation) 是默认平台；同时也支持 AVEVA、Wonderware、GE Cimplicity 与 Siemens WinCC。</p>
        </div>
      </div>
      <div class="sxp-faq__item">
        <button class="sxp-faq__btn" aria-expanded="false" aria-controls="p4-faq-3">
          <span>能否将 KLHK SPARING 集成到我们现有的 DCS？</span><span class="sxp-faq__icon" aria-hidden="true"></span>
        </button>
        <div class="sxp-faq__panel" id="p4-faq-3" role="region">
          <p class="sxp-body">可以。我们曾将 KLHK 要求的参数接入 Honeywell Experion、Yokogawa CENTUM 与 DeltaV，且不影响工厂运营。</p>
        </div>
      </div>
      <div class="sxp-faq__item">
        <button class="sxp-faq__btn" aria-expanded="false" aria-controls="p4-faq-4">
          <span>团队是否具备印尼电气作业资质？</span><span class="sxp-faq__icon" aria-hidden="true"></span>
        </button>
        <div class="sxp-faq__panel" id="p4-faq-4" role="region">
          <p class="sxp-body">具备。SLO 持证电工、PUIL 2011 合规作业流程，并拥有覆盖跨岛部署的合作网络。</p>
        </div>
      </div>
    </div>
  </div>
</section>
