<section class="sxp-section">
  <div class="sxp-wrap">
    <p class="sxp-eyebrow">工作流程</p>
    <h2 class="sxp-h2 sxp-reveal">从评估到优化。</h2>
    <ol class="sxp-proc__list sxp-reveal">
      <li class="sxp-proc__step"><span class="sxp-proc__num">01</span><p class="sxp-proc__title">评估</p><p class="sxp-proc__desc">成熟度诊断、差距分析、利益相关方访谈。</p></li>
      <li class="sxp-proc__step"><span class="sxp-proc__num">02</span><p class="sxp-proc__title">设计</p><p class="sxp-proc__desc">架构蓝图、供应商评估、ROI 模型。</p></li>
      <li class="sxp-proc__step"><span class="sxp-proc__num">03</span><p class="sxp-proc__title">试点</p><p class="sxp-proc__desc">在单条产线或单一工作流上开展概念验证。</p></li>
      <li class="sxp-proc__step"><span class="sxp-proc__num">04</span><p class="sxp-proc__title">规模化</p><p class="sxp-proc__desc">分阶段推广、团队培训与 SOP 落地。</p></li>
      <li class="sxp-proc__step"><span class="sxp-proc__num">05</span><p class="sxp-proc__title">优化</p><p class="sxp-proc__desc">持续改进闭环与 KPI 跟踪。</p></li>
    </ol>
  </div>
</section>
