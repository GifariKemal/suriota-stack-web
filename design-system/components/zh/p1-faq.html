<section class="sxp-section">
  <div class="sxp-wrap">
    <p class="sxp-eyebrow">常见问题</p>
    <h2 class="sxp-h2 sxp-reveal">常见问题。</h2>
    <div class="sxp-faq sxp-reveal">
      <div class="sxp-faq__item">
        <button class="sxp-faq__btn" aria-expanded="false" aria-controls="p1-faq-1">
          <span>典型的 IoT 集成项目需要多久？</span><span class="sxp-faq__icon" aria-hidden="true"></span>
        </button>
        <div class="sxp-faq__panel" id="p1-faq-1" role="region">
          <p class="sxp-body">2–5 条产线的试点通常需 6–10 周；后续按 3 个月一个冲刺分阶段推广，具体时长视现场复杂度而定。</p>
        </div>
      </div>
      <div class="sxp-faq__item">
        <button class="sxp-faq__btn" aria-expanded="false" aria-controls="p1-faq-2">
          <span>是否支持10年以上的旧型 PLC？</span><span class="sxp-faq__icon" aria-hidden="true"></span>
        </button>
        <div class="sxp-faq__panel" id="p1-faq-2" role="region">
          <p class="sxp-body">支持。绝大多数支持 Modbus 的控制器都可接入，包括 S7-300/400、Allen-Bradley SLC/MicroLogix 以及 Mitsubishi FX。</p>
        </div>
      </div>
      <div class="sxp-faq__item">
        <button class="sxp-faq__btn" aria-expanded="false" aria-controls="p1-faq-3">
          <span>数据存储在哪里？</span><span class="sxp-faq__icon" aria-hidden="true"></span>
        </button>
        <div class="sxp-faq__panel" id="p1-faq-3" role="region">
          <p class="sxp-body">由客户自主选择：AWS 印尼区域、Azure 东南亚区域、本地部署或混合部署均可。</p>
        </div>
      </div>
      <div class="sxp-faq__item">
        <button class="sxp-faq__btn" aria-expanded="false" aria-controls="p1-faq-4">
          <span>网络安全如何保障？</span><span class="sxp-faq__icon" aria-hidden="true"></span>
        </button>
        <div class="sxp-faq__panel" id="p1-faq-4" role="region">
          <p class="sxp-body">采用纵深防御：OT 网络分段、TLS 加密至 broker、固件签名、审计日志与基于角色的访问控制。</p>
        </div>
      </div>
    </div>
  </div>
</section>
