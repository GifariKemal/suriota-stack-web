<section class="sxp-section">
  <div class="sxp-wrap">
    <p class="sxp-eyebrow">常见问题</p>
    <h2 class="sxp-h2 sxp-reveal">常见问题。</h2>
    <div class="sxp-faq sxp-reveal">
      <div class="sxp-faq__item">
        <button class="sxp-faq__btn" aria-expanded="false" aria-controls="p5-faq-1">
          <span>典型的 SURGE 部署需要多久？</span><span class="sxp-faq__icon" aria-hidden="true"></span>
        </button>
        <div class="sxp-faq__panel" id="p5-faq-1" role="region">
          <p class="sxp-body">云端托管：从签约到仪表板上线 1–2 周。本地部署：根据基础设施就绪情况，4–6 周。</p>
        </div>
      </div>
      <div class="sxp-faq__item">
        <button class="sxp-faq__btn" aria-expanded="false" aria-controls="p5-faq-2">
          <span>是否提供免费试用？</span><span class="sxp-faq__icon" aria-hidden="true"></span>
        </button>
        <div class="sxp-faq__panel" id="p5-faq-2" role="region">
          <p class="sxp-body">提供。30 天试点，包含全部功能与入门支持。</p>
        </div>
      </div>
      <div class="sxp-faq__item">
        <button class="sxp-faq__btn" aria-expanded="false" aria-controls="p5-faq-3">
          <span>能否将 SURGE 与现有 SCADA 集成？</span><span class="sxp-faq__icon" aria-hidden="true"></span>
        </button>
        <div class="sxp-faq__panel" id="p5-faq-3" role="region">
          <p class="sxp-body">可以。通过 REST API 与标准工业协议（Modbus、OPC UA、MQTT）实现双向集成。</p>
        </div>
      </div>
      <div class="sxp-faq__item">
        <button class="sxp-faq__btn" aria-expanded="false" aria-controls="p5-faq-4">
          <span>数据主权如何保障？</span><span class="sxp-faq__icon" aria-hidden="true"></span>
        </button>
        <div class="sxp-faq__panel" id="p5-faq-4" role="region">
          <p class="sxp-body">本地部署使全部数据保留在您的网络内。混合部署则将敏感数据保留在本地，仅在云端汇总以供仪表板使用。</p>
        </div>
      </div>
    </div>
  </div>
</section>
